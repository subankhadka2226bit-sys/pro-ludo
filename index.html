<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo Pro | Play & Win</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🎲 Ludo<span>PRO</span></div>
        <div class="user-controls">
            <div class="wallet-badge">
                <span id="coin-balance">1,000</span> 🪙
            </div>
            <div class="profile-pic">👤</div>
        </div>
    </header>

    <main class="container">
        <aside class="sidebar">
            <button class="menu-btn active">🏠 Home</button>
            <button class="menu-btn">🏆 Leaderboard</button>
            <button class="menu-btn">⚙️ Settings</button>
        </aside>

        <section class="game-arena">
            
            <div class="glass-panel" id="betting-area">
                <h2>Choose Your Stakes</h2>
                <p>Play against the Bot to double your coins!</p>
                <div class="bet-options">
                    <button class="bet-btn" onclick="placeBet(100)">100 🪙</button>
                    <button class="bet-btn" onclick="placeBet(500)">500 🪙</button>
                    <button class="bet-btn gold-btn" onclick="placeBet(1000)">1000 🪙</button>
                </div>
            </div>

            <div class="glass-panel match-ui" id="active-game-info" style="display: none;">
                <div class="match-header">
                    <div class="player-tag">👤 You</div>
                    <div class="pot-display">POT: <span id="current-pot">0</span> 🪙</div>
                    <div class="player-tag bot">🤖 Bot</div>
                </div>
                
                <div class="dice-container">
                    <div id="dice-display">🎲</div>
                    <button class="action-btn" id="roll-btn" onclick="rollDice()">ROLL DICE</button>
                </div>
                <p id="game-status" class="status-text">Waiting for your roll...</p>
                
                <div class="test-controls">
                    <button onclick="simulateWin()">Claim Win</button>
                    <button onclick="simulateLoss()">Admit Defeat</button>
                </div>
            </div>

            <div class="ludo-board" id="board">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
